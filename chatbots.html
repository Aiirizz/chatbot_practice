<!DOCTYPE html>
<html>
  <head>
    <title>Chat Bot</title>
    <style>
      body {
        font-family: Arial;
        margin-top: 0;
        margin-bottom: 0;
      }
      .send-button {
        background-color: rgb(25, 135, 84);
        color: white;
        padding: 12px 20px;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        margin-left: 10px;
        cursor: pointer;

      }
      .chat-input {
        padding: 12px 15px;
        border-radius: 10px;
        border-width: 1px;
        font-size: 15px;
        flex-grow: 1;
      }
      .chat-input-container {
        display: flex;
        margin-bottom: 20px;
      }
      .app-container {
        display: flex;
        flex-direction: column;
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
        height: 100vh;
      }
      .chat-message-user {
        display: flex;
        justify-content: flex-end;
        align-items: start;
      }
      .chat-message-bot {
        display: flex;
        justify-content: flex-start;
        align-items: start;
      }
      .chat-message-text{
        background-color: rgb(238, 238, 238 );
        padding: 15px 20px;
        border-radius: 10px;
        margin-right: 10px;
        margin-left: 10px;
        margin-bottom: 20px;
        max-width: 300px;
      }
      .chat-message-profile {
        width: 50px;
        height: 50px;
        border-radius: 50%;
      }
      .chat-messages-container {
        flex-grow: 1;
        margin-top: 20px;
        margin-bottom: 20px;
        overflow: scroll;
        scrollbar-width: none;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
      }
      .chat-message-start{
        color: black;
        background-color: rgb(238, 238, 238 );
        text-align: center;
        margin-left: auto;
        margin-right: auto;
        padding: 10px 30px;
        border-radius: 20px;
      }

    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="react-basics.js"></script>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="chatbots.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

      function ChatInput({chatMessages, setChatMessages}) {
        const [inputText, setInputText] = React.useState('');
        const loadingSpinnerUrl = 'loading-spinner.gif';

        function saveInputText(event) {
          setInputText(event.target.value);
        }

        async function sendMessage() {
          const newChatMessages = [
            ...chatMessages, 
            {
              message: inputText,
              sender: 'user',
              id: crypto.randomUUID()
            }
          ];

          setChatMessages(newChatMessages);
          setInputText('');

          // Add loading spinner as a temporary bot message
          const spinnerId = crypto.randomUUID();
          setChatMessages([
            ...newChatMessages,
            {
              message: '<img src="' + loadingSpinnerUrl + '" alt="Loading..." style="width:40px;height:40px;" />',
              sender: 'bot',
              id: spinnerId
            }
          ]);

          // Wait for 1 second before bot responds
          await new Promise(resolve => setTimeout(resolve, 1000));

          const response = Chatbot.getResponse(inputText);
          // Replace spinner with actual bot response
          setChatMessages([
            ...newChatMessages,
            {
              message: response,
              sender: 'bot',
              id: crypto.randomUUID()
            }
          ]);
        }

        return (
          <div className='chat-input-container'>
            <input 
              className='chat-input'
              placeholder="Ketik pesan..." 
              size="30"
              onChange={saveInputText}
              value={inputText}
              onKeyDown={(event) => {
                if (event.key === 'Enter') {
                  sendMessage();
                }
              }}  
            />
            <button 
              onClick={sendMessage}
              className='send-button'
            >Send</button>
          </div>
        );
      }

      function ChatMessage( { message, sender} ) {
        // const message = props.message;
        // const sender = props.sender;
        // const { message, sender } = props;

        /*
        if (sender === "bot") {
          return (
            <div>
              <img src="robot.png" width="50"/>
              {message}
            </div>
          );
        }
        */

        // Render HTML if message contains spinner img tag
        return (
          <div className={
            sender === 'user' 
            ? 'chat-message-user' 
            : 'chat-message-bot'
          }>
            {sender === "bot" && (
              <img src="robot.png" width="50" className='chat-message-profile'/>
            )}
            <div className='chat-message-text'>
              {message.startsWith('<img')
                ? <span dangerouslySetInnerHTML={{ __html: message }} />
                : message}
            </div>
            {sender === "user" && (
              <img src="user.png" width="50" className='chat-message-profile'/>
            )}
          </div>
        );
      }

        function ChatMessages( { chatMessages } ) {
            React.useEffect(() => {
              const chatMessagesContainer = document.querySelector('.chat-messages-container');
              if (chatMessagesContainer) {
                chatMessagesContainer.scrollTop = chatMessagesContainer.scrollHeight; 
              }
            }, [chatMessages]); 

            return (
              <div className='chat-messages-container'>
                {chatMessages.length === 0 ? (
                  <div className='chat-message-start'>
                    Selamat Datang!. Silakan ketik pesan untuk memulai percakapan.
                  </div>
                ) : (
                  chatMessages.map((chatMessage) => {
                    return(
                      <ChatMessage 
                        message={chatMessage.message} 
                        sender={chatMessage.sender}
                        key={chatMessage.id}
                      />
                    );
                  })
                )}
              </div>
            );
        }

      function App () {
          const [chatMessages, setChatMessages] = React.useState([]);

        return (
          <div className='app-container'>
            <ChatMessages 
              chatMessages={chatMessages}
            />
            <ChatInput 
              chatMessages={chatMessages} 
              setChatMessages={setChatMessages}
            />
          </div>
        );
      }
      
      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
